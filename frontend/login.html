<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Vitin App</title>
    <link rel="stylesheet" href="/styles.css?v=2.6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF;
            --bg-dark: #000000;
            --card-bg: #1C1C1E;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #007AFF 0%, #00C7BE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .input-group {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .country-select-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            padding-right: 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 85px;
        }

        .country-select {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            width: 100%;
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Keyboard PIN view */
        .pin-view {
            display: none;
        }

        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--text-secondary);
            transition: 0.2s;
        }

        .dot.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.2);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 300px;
            margin: 0 auto;
        }

        .num-btn {
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 28px;
            font-weight: 500;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .num-btn:active {
            background: #3A3A3C;
            transform: scale(0.9);
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: black;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="login-container" id="phone-section">
        <div class="logo">VITIN APP ELITE</div>
        
        <!-- Toggle Aluno/Professor -->
        <div class="login-tabs" style="display: flex; gap: 10px; margin-bottom: 2rem; background: var(--card-bg); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <button id="tab-aluno" class="tab-btn active" style="flex: 1; padding: 10px; border: none; background: var(--primary); color: white; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;" onclick="switchTab('aluno')">Aluno</button>
            <button id="tab-prof" class="tab-btn" style="flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;" onclick="switchTab('prof')">Professor</button>
        </div>

        <div class="welcome-text" id="welcome-msg">Bem-vindo!</div>
        <div class="subtitle" id="subtitle-msg">Insira seu número para acessar seus treinos.</div>
        
        <div class="input-group">
            <div class="country-select-wrapper">
                <select class="country-select" id="country-code">
                    <option value="+55">🇧🇷 +55</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+351">🇵🇹 +351</option>
                    <option value="+44">🇬🇧 +44</option>
                </select>
                <span style="font-size: 10px; opacity: 0.5;">▼</span>
            </div>
            <input type="tel" id="phone-input" placeholder="WhatsApp com DDD" maxlength="15">
        </div>

        <!-- Campo de Senha (Visível apenas para Professor) -->
        <div id="prof-password-group" class="input-group hidden" style="margin-top: -12px; display: none;">
            <span style="margin-right: 8px; opacity: 0.5;">🔒</span>
            <input type="password" id="password-input" placeholder="Sua senha secreta">
        </div>

        <button class="btn-primary" id="main-login-btn" onclick="handleContinue()">Continuar</button>
        
        <button id="biometry-login-btn" class="btn-primary" style="margin-top: 12px; background: rgba(255,255,255,0.05); color: var(--text-main); display: none;" onclick="loginWithBiometry()">
            <span style="margin-right: 8px;">👤</span> Acessar com Face ID
        </button>
    </div>

    <div class="login-container pin-view" id="pin-section">
        <div class="logo">VITIN APP</div>
        <div class="welcome-text">Insira seu PIN</div>
        <div class="subtitle" id="pin-subtitle">Padrão: 1234</div>

        <div class="pin-dots" id="pin-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="addPin('1')">1</button>
            <button class="num-btn" onclick="addPin('2')">2</button>
            <button class="num-btn" onclick="addPin('3')">3</button>
            <button class="num-btn" onclick="addPin('4')">4</button>
            <button class="num-btn" onclick="addPin('5')">5</button>
            <button class="num-btn" onclick="addPin('6')">6</button>
            <button class="num-btn" onclick="addPin('7')">7</button>
            <button class="num-btn" onclick="addPin('8')">8</button>
            <button class="num-btn" onclick="addPin('9')">9</button>
            <div style="width: 70px;"></div>
            <button class="num-btn" onclick="addPin('0')">0</button>
            <button class="num-btn" onclick="clearPin()">⌫</button>
        </div>
        
        <button class="btn-primary" style="margin-top: 40px; background: none; color: var(--text-secondary);" onclick="backToPhone()">Voltar</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="login.js?v=2.5"></script>
    <script src="premium-features.js?v=2.5"></script>
</body>
</html>
